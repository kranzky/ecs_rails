name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gem:
    name: gem suite (RSpec + PostgreSQL)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gem

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecs_rails_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The gem's spec_helper reads DATABASE_URL; point it at the service above.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ecs_rails_test

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.5"
          bundler-cache: true
          working-directory: gem

      - name: RSpec
        run: bundle exec rspec --format progress
